name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows Installer
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Rebuild native modules (Electron ABI)
        run: pnpm exec electron-rebuild -f -w better-sqlite3,keytar

      - name: Build and package
        run: pnpm dist:win --publish always
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          # Code signing — set these secrets in the GitHub repo settings when
          # a Windows Authenticode certificate is available.
          # CSC_LINK: ${{ secrets.CSC_LINK }}
          # CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          LICENSE_STORE_ID: ${{ secrets.LICENSE_STORE_ID }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: windows-installer
          path: dist/*.exe
          retention-days: 7
